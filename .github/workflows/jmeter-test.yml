name: JMeter Performance Test

on:
  workflow_dispatch:
  schedule:
    - cron: '30 3 * * *' 

jobs:
  jmeter-test:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Create Results Folder
        run: mkdir -p results
        
      - name: Set run details
        run: |
          run_number=$(($GITHUB_RUN_NUMBER - 1))
          run_date=$(TZ=Asia/Kolkata date +'%Y-%m-%d')
          run_time=$(TZ=Asia/Kolkata date +'%I:%M %p IST')
          echo "run_number=$run_number" >> $GITHUB_ENV
          echo "run_date=$run_date" >> $GITHUB_ENV
          echo "run_time=$run_time" >> $GITHUB_ENV
    
      - name: Run JMeter using Docker
        run: |
          docker run --rm \
          -v ${{ github.workspace }}:/tests \
          -w /tests \
          justb4/jmeter:latest \
          -n \
          -t SolarionAPIs_V2.jmx \
          -l results/result.jtl \
          -e -o results/report

      - name: Upload HTML Report
        uses: actions/upload-artifact@v4
        with:
          name: jmeter-html-report
          path: results/report

      - name: Upload JTL Result
        uses: actions/upload-artifact@v4
        with:
          name: jmeter-results
          path: results/result.jtl

      - name: Parse JTL file and prepare email content
        id: parse-results
        run: |
          declare -A total_time
          declare -A count
          declare -A errors
          declare -A last_code
          declare -A times

          parsed_results="<table style='border-collapse:collapse;width:auto;max-width:900px;margin:auto;'>"
          parsed_results="$parsed_results<tr style='background-color:yellow;'>"
          parsed_results="$parsed_results<th style='border:1px solid black;padding:8px;'>Label</th>"
          parsed_results="$parsed_results<th style='border:1px solid black;padding:8px;'>Avg Response Time</th>"
          parsed_results="$parsed_results<th style='border:1px solid black;padding:8px;'>95th Percentile</th>"
          parsed_results="$parsed_results<th style='border:1px solid black;padding:8px;'>Error Rate</th>"
          parsed_results="$parsed_results<th style='border:1px solid black;padding:8px;'>Throughput</th>"
          parsed_results="$parsed_results<th style='border:1px solid black;padding:8px;'>Response Code</th>"
          parsed_results="$parsed_results<th style='border:1px solid black;padding:8px;'>Status</th>"
          parsed_results="$parsed_results</tr>"

          overall_status="Successful"

          while IFS=, read -r timeStamp elapsed label responseCode responseMessage threadName dataType success failureMessage bytes sentBytes grpThreads allThreads URL Latency IdleTime Connect
          do

            if [ "$label" == "label" ]; then
              continue
            fi
            
            total_time[$label]=$(( ${total_time[$label]:-0} + elapsed ))
            count[$label]=$(( ${count[$label]:-0} + 1 ))
            times[$label]="${times[$label]} $elapsed"
            last_code[$label]=$responseCode

            if [[ ! "$responseCode" =~ ^2 ]]; then
              errors[$label]=$(( ${errors[$label]:-0} + 1 ))
            fi
            

          done < results/result.jtl


          for label in "${!count[@]}"
          do

            total=${total_time[$label]}
            c=${count[$label]}

            avg=$(printf "%.2f" $(echo "$total / $c / 1000" | bc -l))

            sorted=$(echo ${times[$label]} | tr ' ' '\n' | sort -n)
            p95_index=$(( (95 * c + 99) / 100 ))
            p95=$(echo "$sorted" | sed -n "${p95_index}p")
            p95=$(printf "%.2f" $(echo "$p95 / 1000" | bc -l))

            err=${errors[$label]:-0}
            error_rate=$(printf "%.2f" $(echo "$err * 100 / $c" | bc -l))

            throughput=$(printf "%.2f" $(echo "$c / 60" | bc -l))

            code=${last_code[$label]}

            if [[ "$code" =~ ^2 ]]; then
              status="<span style='color:green;'>Success</span>"
            else
              status="<span style='color:red;'>Failure</span>"
              overall_status="Failure"
            fi

            parsed_results="$parsed_results<tr>"
            parsed_results="$parsed_results<td style='border:1px solid black;padding:8px;'>$label</td>"
            parsed_results="$parsed_results<td style='border:1px solid black;padding:8px;'>${avg} sec</td>"
            parsed_results="$parsed_results<td style='border:1px solid black;padding:8px;'>${p95} sec</td>"
            parsed_results="$parsed_results<td style='border:1px solid black;padding:8px;'>${error_rate}%</td>"
            parsed_results="$parsed_results<td style='border:1px solid black;padding:8px;'>${throughput} req/sec</td>"
            parsed_results="$parsed_results<td style='border:1px solid black;padding:8px;'>$code</td>"
            parsed_results="$parsed_results<td style='border:1px solid black;padding:8px;'>$status</td>"
            parsed_results="$parsed_results</tr>"

          done

          parsed_results="$parsed_results</table>"

          echo "parsed_results<<EOF" >> $GITHUB_ENV
          echo "$parsed_results" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

          echo "overall_status=$overall_status" >> $GITHUB_ENV

      - name: Send Email with Result
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: "Solarion Health Report - #${{ env.run_number }} - ${{ env.run_date }} ${{ env.run_time }} - Status: ${{ env.overall_status }}"
          html_body: |
            <html>
            <body style="font-family: Calibri, sans-serif;">

              <p>Please find the details of Application responsiveness:</p>

              ${{ env.parsed_results }}

              <p><b>Build Information:</b></p>
              <p>
              Build Health Status: ${{ env.overall_status }} <br>
              Build Date and Time: ${{ env.run_date }} ${{ env.run_time }}
              </p>

              <p><b>Summary:</b></p>
              <p>${{ env.summary }}</p>

              <p>Thanks,<br>QA Team</p>

              <p style="color: gray;">Note: This is an auto-generated email.</p>

            </body>
            </html>

          to: deepak@thinktime.in
          from: ${{ secrets.EMAIL_USERNAME }}
          priority: normal
          attachments: results/result.jtl
