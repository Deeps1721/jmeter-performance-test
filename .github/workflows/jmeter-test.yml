name: JMeter Performance Test

on:
  schedule:
    - cron: '0 2 * * *'   # runs daily (7:30 AM IST)
  workflow_dispatch:

jobs:
  performance-test:
    runs-on: ubuntu-latest

    steps:

    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '11'

    - name: Install Apache JMeter
      run: |
        wget https://archive.apache.org/dist/jmeter/binaries/apache-jmeter-5.6.3.tgz
        tar -xzf apache-jmeter-5.6.3.tgz
        mv apache-jmeter-5.6.3 jmeter

    - name: Create Results Folder
      run: mkdir results

    - name: Run JMeter Test
      run: |
        ./jmeter/bin/jmeter -n \
        -t Sample_RestAPIs.jmx \
        -l results/result.jtl \
        -e -o results/report

    - name: Upload HTML Report
      uses: actions/upload-artifact@v4
      with:
        name: jmeter-html-report
        path: results/report

    - name: Upload JTL Result
      uses: actions/upload-artifact@v4
      with:
        name: jmeter-results
        path: results/result.jtl

    - name: Send Email with Result
      uses: dawidd6/action-send-mail@v3
      with:
        server_address: smtp.gmail.com
        server_port: 465
        username: ${{ secrets.EMAIL_USERNAME }}
        password: ${{ secrets.EMAIL_PASSWORD }}
        subject: JMeter Performance Test Result
        to: deepak@thinktime.in
        from: GitHub JMeter Bot
        body: |
          Hello,

          Your scheduled JMeter performance test has completed.

          Download the HTML report from GitHub Actions artifacts.

          Repository: ${{ github.repository }}
          Run ID: ${{ github.run_id }}

          Regards,
          GitHub Actions
        attachments: results/result.jtl
